<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M.I.T. EC.716 System Simulator</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // --- Inline SVG Icons (Replacing lucide-react for standalone HTML) ---
        const IconBase = ({ children, size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );

        const Wind = (p) => <IconBase {...p}><path d="M17.7 7.7a2.5 2.5 0 1 1 1.8 4.3H2"/><path d="M9.6 4.6A2 2 0 1 1 11 8H2"/><path d="M12.6 19.4A2 2 0 1 0 14 16H2"/></IconBase>;
        const Droplets = (p) => <IconBase {...p}><path d="M7 16.3c2.2 0 4-1.83 4-4.05 0-1.16-.57-2.26-1.71-3.19S7 2.9 7 2.9s-2.29 4.25-3.29 5.16C2.57 9.08 2 10.2 2 11.36c0 2.22 1.8 4.05 4 4.05z"/><path d="M12.56 6.6A10.97 10.97 0 0 1 14 8.5c1.14.93 1.71 2.03 1.71 3.19 0 2.22-1.8 4.05-4 4.05-2.2 0-4-1.83-4-4.05 0-1.16.57-2.26 1.71-3.19S12.56 2.9 12.56 2.9s-2.29 4.25-3.29 5.16c-.43.39-.8.8-1.1 1.25"/></IconBase>;
        const Flame = (p) => <IconBase {...p}><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></IconBase>;
        const Snowflake = (p) => <IconBase {...p}><line x1="2" y1="12" x2="22" y2="12"/><line x1="12" y1="2" x2="12" y2="22"/><path d="m20 16-4-4 4-4"/><path d="m4 8 4 4-4 4"/><path d="m16 4-4 4-4-4"/><path d="m8 20 4-4 4 4"/></IconBase>;
        const Settings = (p) => <IconBase {...p}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></IconBase>;
        const ArrowRight = (p) => <IconBase {...p}><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></IconBase>;
        const RefreshCw = (p) => <IconBase {...p}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></IconBase>;

        // --- Main Application ---
        function App() {
            const [isTenSystem, setIsTenSystem] = useState(false);
            const [isWinter, setIsWinter] = useState(true);
            
            // Interactive Variables
            const [oat, setOat] = useState(44.9);
            const [hwSpt, setHwSpt] = useState(87.2);
            const [cwSpt, setCwSpt] = useState(44.0);

            // Simulated Live Data State
            const [vfd, setVfd] = useState(56.6);
            const [hws, setHws] = useState(95.4);
            const [hwr, setHwr] = useState(94.2);
            const [cws, setCws] = useState(80.2);
            const [cwr, setCwr] = useState(89.0);
            const [cop, setCop] = useState(1.0);
            const [powerKw, setPowerKw] = useState(3.5);

            // Simulation Logic: React to OAT and Setpoints
            useEffect(() => {
                if (isWinter) {
                    const loadFactor = Math.max(0, (65 - oat) / 45);
                    const targetHws = hwSpt + (loadFactor * 15);
                    
                    setHws(targetHws.toFixed(1));
                    setHwr((targetHws - 1.2 - (loadFactor * 2)).toFixed(1));
                    
                    const newVfd = Math.min(100, Math.max(20, 30 + (loadFactor * 70)));
                    setVfd(newVfd.toFixed(1));

                    setCws((oat + 2).toFixed(1));
                    setCwr((oat + 3).toFixed(1));

                    if (isTenSystem) {
                        const lift = targetHws - 45;
                        const currentCop = 6.0 - (lift * 0.03); 
                        setCop(Math.max(2.5, currentCop).toFixed(2));
                        setPowerKw((((newVfd/100) * 105 * 500 * 1.2) / 3412 / currentCop).toFixed(1));
                    } else {
                        setCop("0.95");
                        setPowerKw(((newVfd/100) * 2.2).toFixed(1));
                    }
                } else {
                    const loadFactor = Math.max(0, (oat - 65) / 30);
                    const targetCws = cwSpt;
                    
                    setCws(targetCws.toFixed(1));
                    setCwr((targetCws + 10 + (loadFactor * 4)).toFixed(1));
                    
                    const newVfd = Math.min(100, Math.max(20, 40 + (loadFactor * 60)));
                    setVfd(newVfd.toFixed(1));

                    setHws((oat + 5).toFixed(1));
                    setHwr((oat + 4).toFixed(1));

                    if (isTenSystem) {
                        const lift = 65 - targetCws;
                        const currentCop = 7.0 - (lift * 0.05);
                        setCop(currentCop.toFixed(2));
                        setPowerKw((((newVfd/100) * 105 * 500 * 10) / 3412 / currentCop).toFixed(1));
                    } else {
                        const currentCop = Math.max(1.5, 3.5 - ((oat - 70) * 0.05));
                        setCop(currentCop.toFixed(2));
                        setPowerKw((((newVfd/100) * 105 * 500 * 10) / 3412 / currentCop).toFixed(1));
                    }
                }
            }, [oat, hwSpt, cwSpt, isWinter, isTenSystem]);

            return (
                <div className="min-h-screen bg-slate-200 p-4 font-sans text-slate-800">
                <div className="max-w-7xl mx-auto space-y-4">
                    
                    {/* Top Control Bar */}
                    <div className="bg-[#0f172a] text-white rounded-t-xl shadow-lg border-b-4 border-indigo-500 p-4 flex flex-col md:flex-row justify-between items-center gap-4">
                    <div>
                        <h1 className="text-xl font-bold tracking-wider">M.I.T - Phi Beta Epsilon</h1>
                        <p className="text-slate-400 text-sm">{isTenSystem ? 'PROPOSED 5GDHC TEN SYSTEM' : 'LEGACY MECHANICAL SYSTEM (HEX)'}</p>
                    </div>
                    
                    <div className="flex gap-4">
                        <button
                        onClick={() => setIsWinter(!isWinter)}
                        className={`px-4 py-2 rounded flex items-center gap-2 font-bold text-sm uppercase tracking-wide border-2 transition-all ${isWinter ? 'bg-blue-900 border-blue-500 text-blue-100' : 'bg-orange-900 border-orange-500 text-orange-100'}`}
                        >
                        {isWinter ? <><Snowflake size={16} /> Winter Mode</> : <><Flame size={16} /> Summer Mode</>}
                        </button>
                        <button
                        onClick={() => setIsTenSystem(!isTenSystem)}
                        className={`px-4 py-2 flex items-center gap-2 rounded font-bold text-sm uppercase tracking-wide border-2 transition-all ${isTenSystem ? 'bg-emerald-900 border-emerald-500 text-emerald-100' : 'bg-slate-700 border-slate-500 text-slate-200'}`}
                        >
                        {isTenSystem ? <><Settings size={16} /> View Legacy System</> : <><RefreshCw size={16} /> View TEN System</>}
                        </button>
                    </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-4 gap-4">
                    
                    {/* SCADA Diagram Canvas */}
                    <div className="lg:col-span-3 bg-[#e2e8f0] rounded-b-xl shadow-inner border border-slate-300 p-6 relative overflow-hidden min-h-[600px] flex items-center justify-center">
                        
                        {/* Global OAT Tag */}
                        <div className="absolute top-6 right-6">
                        <BmsTag label="OAT" value={`${oat} °F`} isLive={true} />
                        <BmsTag label="Season Switch" value={isWinter ? 'Winter' : 'Summer'} className="mt-1" />
                        </div>

                        {!isTenSystem ? (
                        // ================= LEGACY SYSTEM DIAGRAM =================
                        <div className="relative w-full max-w-4xl h-full">
                            
                            {/* Roof Chiller */}
                            <div className="absolute top-0 right-20 flex flex-col items-center">
                            <div className="bg-[#cbd5e1] border-2 border-slate-400 p-4 rounded shadow-lg w-48 text-center">
                                <div className="font-bold text-slate-700 border-b border-slate-400 mb-2 pb-1">Daikin 40T Chiller</div>
                                <Wind className={`mx-auto text-slate-500 mb-2 ${!isWinter ? 'animate-pulse' : ''}`} />
                                <BmsTag label="Chiller Status" value={!isWinter ? 'Run' : 'Off'} />
                                <BmsTag label="Chw Spt" value={`${cwSpt} °F`} className="mt-1" />
                            </div>
                            {/* Roof Pipes */}
                            <div className="flex h-32 w-16 justify-between mt-2">
                                <div className={`w-3 h-full ${!isWinter ? 'bg-blue-400' : 'bg-slate-300'} border border-slate-400 relative`}>
                                {!isWinter && <div className="absolute top-0 w-full h-full bg-blue-300 animate-[pulse_1s_infinite]"></div>}
                                </div>
                                <div className={`w-3 h-full ${!isWinter ? 'bg-blue-600' : 'bg-slate-300'} border border-slate-400 relative`}>
                                {!isWinter && <div className="absolute top-0 w-full h-full bg-blue-500 animate-[pulse_1s_infinite]"></div>}
                                </div>
                            </div>
                            <div className="flex justify-between w-32 mt-2">
                                <BmsTag label="CHWR" value={`${cwr} °F`} />
                                <BmsTag label="CHWS" value={`${cws} °F`} />
                            </div>
                            </div>

                            {/* Basement Steam HEX */}
                            <div className="absolute bottom-20 left-10 flex flex-col items-center">
                            <div className="bg-[#ef4444] border-2 border-red-700 p-4 rounded-full shadow-lg text-center flex items-center gap-4 text-white w-48">
                                <Flame className={isWinter ? 'animate-pulse' : ''} />
                                <div className="font-bold">Steam HX-1</div>
                            </div>
                            <div className="mt-4 bg-slate-300 p-2 border border-slate-400 rounded">
                                <div className="text-xs font-bold text-slate-600">MIT Steam Plant</div>
                                <BmsTag label="Status" value={isWinter ? '15 psi' : '0 psi'} />
                            </div>
                            </div>

                            {/* Hydronic Loop & Pumps */}
                            <div className="absolute bottom-20 left-1/3 w-96 h-32 border-4 border-slate-400 rounded-lg flex items-center justify-center bg-slate-200/50 shadow-inner">
                            {/* Pipe coloring based on season */}
                            <div className={`absolute -top-1 w-full h-2 ${isWinter ? 'bg-red-500' : 'bg-blue-500'} animate-[pulse_2s_infinite]`}></div>
                            <div className={`absolute -bottom-1 w-full h-2 ${isWinter ? 'bg-red-400' : 'bg-blue-400'} animate-[pulse_2s_infinite]`}></div>
                            
                            <div className="flex flex-col gap-4">
                                <div className="flex gap-4">
                                    <BmsTag label="HWS" value={`${hws} °F`} isLive={isWinter} highlight={isWinter} />
                                    <BmsTag label="HWR" value={`${hwr} °F`} isLive={isWinter} />
                                </div>
                                <div className="bg-slate-300 border-2 border-slate-400 p-3 rounded text-center shadow-md">
                                    <div className="font-bold text-sm mb-1">P1 (Bell & Gossett)</div>
                                    <div className="grid grid-cols-2 gap-1 text-xs">
                                    <BmsTag label="S/S" value="On" />
                                    <BmsTag label="Vfd" value={`${vfd} %`} isLive={true} />
                                    <BmsTag label="Amps" value="4.0 A" />
                                    <BmsTag label="Dp" value="6.1 psi" isLive={true} />
                                    </div>
                                </div>
                            </div>
                            </div>

                            {/* Building Load Indicator */}
                            <div className="absolute bottom-20 right-0 bg-slate-100 border-2 border-slate-400 p-4 rounded shadow-lg w-40 text-center">
                            <div className="font-bold text-slate-700 text-sm">To Building FCUs</div>
                            <ArrowRight className={`mx-auto mt-2 ${isWinter ? 'text-red-500' : 'text-blue-500'}`} />
                            </div>

                        </div>
                        ) : (
                        // ================= TEN SYSTEM DIAGRAM =================
                        <div className="relative w-full max-w-4xl h-full">
                            
                            {/* Ambient Loop Source (River/Borehole) */}
                            <div className="absolute top-1/2 -translate-y-1/2 left-0 flex flex-col items-center">
                            <div className="bg-teal-700 border-2 border-teal-900 p-4 rounded-xl shadow-lg w-56 text-center text-white">
                                <Droplets className="mx-auto mb-2 opacity-80" size={32} />
                                <div className="font-bold text-lg mb-1">5GDHC Ambient Loop</div>
                                <div className="text-xs text-teal-200 uppercase tracking-widest mb-3">Charles River / Boreholes</div>
                                <BmsTag label="Source Supply" value="50.0 °F" dark={true} />
                                <BmsTag label="Source Return" value={isWinter ? '43.0 °F' : '60.0 °F'} className="mt-1" dark={true} />
                            </div>
                            </div>

                            {/* Connecting Ambient Pipes */}
                            <div className="absolute top-1/2 -translate-y-1/2 left-56 w-32 h-16 border-y-4 border-teal-600 flex items-center justify-center">
                            <ArrowRight className="text-teal-600 animate-[pulse_1s_infinite]" />
                            </div>

                            {/* Water-to-Water GSHP (Replacing HX and Chiller) */}
                            <div className="absolute top-1/2 -translate-y-1/2 left-1/3 ml-10 flex flex-col items-center z-10">
                            <div className="bg-[#cbd5e1] border-4 border-indigo-500 p-6 rounded-lg shadow-2xl w-72 text-center relative overflow-hidden">
                                <div className="absolute top-0 right-0 bg-indigo-500 text-white text-[10px] font-bold px-2 py-1 rounded-bl uppercase">Proposed</div>
                                <RefreshCw className="mx-auto text-indigo-600 mb-2 animate-[spin_3s_linear_infinite]" size={40} />
                                <div className="font-bold text-slate-800 text-lg">Water-to-Water GSHP</div>
                                <div className="text-xs text-slate-500 mb-4">Central Heat Pump Plant</div>
                                
                                <div className="grid grid-cols-2 gap-2">
                                <BmsTag label="Mode" value={isWinter ? 'Heating' : 'Cooling'} highlight={true} />
                                <BmsTag label="Compressor" value={`${vfd} %`} isLive={true} />
                                <BmsTag label="Est. COP" value={cop} isLive={true} highlight={true} />
                                <BmsTag label="Power" value={`${powerKw} kW`} isLive={true} />
                                </div>
                            </div>
                            </div>

                            {/* Hydronic Loop to Building */}
                            <div className="absolute top-1/2 -translate-y-1/2 right-32 w-32 h-16 border-y-4 border-slate-400 flex flex-col justify-between py-2 items-center">
                            <div className={`absolute top-0 w-full h-1 ${isWinter ? 'bg-red-500' : 'bg-blue-500'} animate-[pulse_1.5s_infinite]`}></div>
                            <div className={`absolute bottom-0 w-full h-1 ${isWinter ? 'bg-red-400' : 'bg-blue-400'} animate-[pulse_1.5s_infinite]`}></div>
                            <ArrowRight className={isWinter ? 'text-red-500' : 'text-blue-500'} />
                            </div>

                            {/* Building Load Indicator */}
                            <div className="absolute top-1/2 -translate-y-1/2 right-0 bg-slate-100 border-2 border-slate-400 p-4 rounded shadow-lg w-40 text-center">
                            <div className="font-bold text-slate-700 text-sm mb-2">Chillitrix FCUs</div>
                            <BmsTag label="Supply" value={isWinter ? `${hws} °F` : `${cws} °F`} isLive={true} />
                            <BmsTag label="Return" value={isWinter ? `${hwr} °F` : `${cwr} °F`} className="mt-1" />
                            </div>

                        </div>
                        )}
                    </div>

                    {/* Interactive Controls & Metrics Panel */}
                    <div className="bg-white rounded-xl shadow border border-slate-200 p-6 flex flex-col gap-6">
                        <div>
                        <h2 className="text-lg font-bold text-slate-800 border-b border-slate-200 pb-2 mb-4 flex items-center gap-2">
                            <Settings size={20} className="text-slate-500"/> Simulation Controls
                        </h2>
                        
                        <div className="space-y-4">
                            {/* OAT Slider */}
                            <div className="bg-slate-50 p-3 rounded border border-slate-200">
                            <label className="text-xs font-bold text-slate-600 uppercase mb-2 flex justify-between">
                                <span>Outside Air Temp (OAT)</span>
                                <span className="text-blue-600">{oat} °F</span>
                            </label>
                            <input 
                                type="range" 
                                min="-10" 
                                max="100" 
                                step="0.1" 
                                value={oat} 
                                onChange={(e) => setOat(parseFloat(e.target.value))}
                                className="w-full accent-blue-600"
                            />
                            <div className="flex justify-between text-[10px] text-slate-400 mt-1">
                                <span>-10°F</span>
                                <span>100°F</span>
                            </div>
                            </div>

                            {/* Setpoint Sliders */}
                            {isWinter ? (
                            <div className="bg-slate-50 p-3 rounded border border-slate-200">
                                <label className="text-xs font-bold text-slate-600 uppercase mb-2 flex justify-between">
                                <span>Hot Water Setpoint</span>
                                <span className="text-red-600">{hwSpt} °F</span>
                                </label>
                                <input 
                                type="range" 
                                min="75" 
                                max="140" 
                                step="0.1" 
                                value={hwSpt} 
                                onChange={(e) => setHwSpt(parseFloat(e.target.value))}
                                className="w-full accent-red-600"
                                />
                            </div>
                            ) : (
                            <div className="bg-slate-50 p-3 rounded border border-slate-200">
                                <label className="text-xs font-bold text-slate-600 uppercase mb-2 flex justify-between">
                                <span>Chilled Water Setpoint</span>
                                <span className="text-blue-600">{cwSpt} °F</span>
                                </label>
                                <input 
                                type="range" 
                                min="40" 
                                max="60" 
                                step="0.1" 
                                value={cwSpt} 
                                onChange={(e) => setCwSpt(parseFloat(e.target.value))}
                                className="w-full accent-blue-600"
                                />
                            </div>
                            )}
                        </div>
                        </div>

                        {/* Live Metrics Comparison */}
                        <div className="mt-auto">
                        <h2 className="text-sm font-bold text-slate-800 border-b border-slate-200 pb-2 mb-3">Live Performance Metrics</h2>
                        <div className="space-y-2">
                            <MetricRow label="System COP" value={cop} highlight={isTenSystem} />
                            <MetricRow label="Est. Power Draw" value={`${powerKw} kW`} />
                            <MetricRow label="VFD Demand" value={`${vfd}%`} />
                            
                            <div className={`mt-4 p-3 rounded text-sm text-center font-medium ${isTenSystem ? 'bg-emerald-100 text-emerald-800 border border-emerald-200' : 'bg-slate-100 text-slate-600 border border-slate-200'}`}>
                            {isTenSystem ? 'High Efficiency GSHP Active' : 'Legacy Equipment Active'}
                            </div>
                        </div>
                        </div>
                        
                    </div>

                    </div>
                </div>
                </div>
            );
        }

        // --- Reusable Components ---
        function BmsTag({ label, value, isLive = false, highlight = false, className = "", dark = false }) {
            const bg = dark ? 'bg-[#0f172a]' : 'bg-white';
            const border = dark ? 'border-slate-600' : 'border-slate-300';
            const labelColor = dark ? 'text-slate-400' : 'text-slate-500';
            
            let valColor = 'text-slate-800';
            let valBg = 'bg-slate-100';
            
            if (isLive) {
                valColor = 'text-emerald-500';
                valBg = 'bg-[#0f172a] shadow-inner';
            } else if (highlight) {
                valColor = 'text-amber-500';
                valBg = 'bg-[#0f172a] shadow-inner';
            }

            return (
                <div className={`flex items-center justify-between gap-2 px-2 py-1 border ${border} ${bg} rounded text-xs ${className}`}>
                <span className={labelColor}>{label}</span>
                <span className={`font-mono font-bold px-1.5 py-0.5 rounded ${valBg} ${valColor}`}>
                    {value}
                </span>
                </div>
            );
        }

        function MetricRow({ label, value, highlight = false }) {
            return (
                <div className="flex justify-between items-center text-sm">
                <span className="text-slate-600">{label}</span>
                <span className={`font-bold ${highlight ? 'text-emerald-600' : 'text-slate-800'}`}>{value}</span>
                </div>
            );
        }

        // --- Mount App ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
