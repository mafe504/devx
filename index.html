<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M.I.T. PBE BAS Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes flow {
            0% { stroke-dashoffset: 24; }
            100% { stroke-dashoffset: 0; }
        }
        .pipe-flow {
            stroke-dasharray: 12;
            animation: flow 1s linear infinite;
        }
        .pipe-flow.reverse {
            animation: flow 1s linear infinite reverse;
        }
        .pump-spin {
            animation: spin 2s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 font-sans h-screen overflow-hidden select-none">
    <div id="root" class="h-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            // System States
            const [systemEnabled, setSystemEnabled] = useState(true);
            const [season, setSeason] = useState('Winter'); // Winter or Summer
            const [oat, setOat] = useState(39.7);
            
            // Equipment States
            const [leadPump, setLeadPump] = useState('P2');
            const [pump1, setPump1] = useState({ on: false, speed: 0, override: false });
            const [pump2, setPump2] = useState({ on: true, speed: 61.0, override: false });
            
            // Heating/Cooling States
            const [chillerOn, setChillerOn] = useState(false);
            const [valve1_3, setValve1_3] = useState(82.3);
            const [valve2_3, setValve2_3] = useState(18.0);
            
            // Sensor Values
            const [supplyTemp, setSupplyTemp] = useState(99.5);
            const [returnTemp, setReturnTemp] = useState(85.2);
            const [dp, setDp] = useState(5.9);
            const dpSetpoint = 6.0;

            // Derived Setpoint based on Reset Schedule
            // Winter: 60F OAT = 75F HWS, -20F OAT = 170F HWS
            const calculateHWSSetpoint = (currentOat) => {
                const x1 = 60, y1 = 75;
                const x2 = -20, y2 = 170;
                let calc = y1 + ((currentOat - x1) * (y2 - y1)) / (x2 - x1);
                return Math.max(75, Math.min(170, calc));
            };

            const [setpoint, setSetpoint] = useState(calculateHWSSetpoint(39.7));

            // Simulation Loop
            useEffect(() => {
                const interval = setInterval(() => {
                    if (!systemEnabled) {
                        setPump1(p => ({ ...p, on: false, speed: 0 }));
                        setPump2(p => ({ ...p, on: false, speed: 0 }));
                        setValve1_3(0);
                        setValve2_3(0);
                        setChillerOn(false);
                        // Fix: Ensure dp remains a number by prefixing with + when calculating fallback state
                        setDp(d => +(Math.max(0, d - 0.5).toFixed(1)));
                        
                        // Temps equalize to ambient
                        setSupplyTemp(t => {
                            const diff = oat - t;
                            return +(t + diff * 0.05).toFixed(1);
                        });
                        setReturnTemp(t => {
                            const diff = oat - t;
                            return +(t + diff * 0.05).toFixed(1);
                        });
                        return;
                    }

                    // Active System Logic
                    const targetSpt = season === 'Winter' ? calculateHWSSetpoint(oat) : 45.0;
                    setSetpoint(+targetSpt.toFixed(1));

                    // Pump Logic
                    const activePump1 = (leadPump === 'P1' && !pump1.override) || (leadPump === 'P2' && pump2.override);
                    const activePump2 = (leadPump === 'P2' && !pump2.override) || (leadPump === 'P1' && pump1.override);
                    
                    setPump1(p => ({ ...p, on: activePump1, speed: activePump1 ? 61 + (Math.random() * 2 - 1) : 0 }));
                    setPump2(p => ({ ...p, on: activePump2, speed: activePump2 ? 61 + (Math.random() * 2 - 1) : 0 }));
                    
                    // DP Fluctuation
                    setDp(+(dpSetpoint + (Math.random() * 0.2 - 0.1)).toFixed(1));

                    // Temperature & Valve Logic
                    if (season === 'Winter') {
                        setChillerOn(false);
                        const error = targetSpt - supplyTemp;
                        
                        // Valve PI controller simulation
                        let newV1 = valve1_3 + error * 2;
                        let newV2 = valve2_3;
                        
                        if (newV1 > 100) {
                            newV2 += (newV1 - 100);
                            newV1 = 100;
                        } else if (newV1 < 0) {
                            newV1 = 0;
                        }

                        if (newV2 > 100) newV2 = 100;
                        if (newV2 < 0 && newV1 < 100) newV2 = 0;

                        setValve1_3(+newV1.toFixed(1));
                        setValve2_3(+newV2.toFixed(1));

                        // Supply temp rises/falls based on valves
                        const heatInput = (newV1 * 0.3) + (newV2 * 0.7); // 1/3 and 2/3 capacities
                        const targetTemp = 70 + (heatInput * 1.2); 
                        
                        setSupplyTemp(t => +(t + (targetSpt - t) * 0.1 + (Math.random()*0.2-0.1)).toFixed(1));
                        setReturnTemp(t => +(t + ((supplyTemp - 15) - t) * 0.05).toFixed(1));
                        
                    } else { // Summer
                        setValve1_3(0);
                        setValve2_3(0);
                        setChillerOn(true);
                        
                        setSupplyTemp(t => +(t + (targetSpt - t) * 0.1 + (Math.random()*0.2-0.1)).toFixed(1));
                        setReturnTemp(t => +(t + ((supplyTemp + 10) - t) * 0.05).toFixed(1));
                    }

                }, 1000);
                return () => clearInterval(interval);
            }, [systemEnabled, season, oat, leadPump, pump1.override, pump2.override, supplyTemp, valve1_3, valve2_3]);

            const pipeColor = season === 'Winter' ? 'stroke-red-500' : 'stroke-blue-500';
            const returnPipeColor = season === 'Winter' ? 'stroke-orange-500' : 'stroke-cyan-500';
            const isActive = systemEnabled && (pump1.on || pump2.on);

            const SystemValue = ({ label, value, unit, active=false }) => (
                <div className={`flex flex-col bg-slate-900 border ${active ? 'border-green-500/50' : 'border-slate-700'} p-2 rounded shadow-inner min-w-[80px] items-center`}>
                    <span className="text-[10px] text-slate-400 uppercase tracking-wider mb-1">{label}</span>
                    <span className={`text-lg font-mono font-bold ${active ? 'text-green-400' : 'text-slate-100'}`}>
                        {value} <span className="text-sm text-slate-500">{unit}</span>
                    </span>
                </div>
            );

            return (
                <div className="flex flex-col h-full bg-slate-950 p-4">
                    {/* Header */}
                    <header className="flex justify-between items-center bg-slate-900 p-4 rounded-xl border border-slate-800 shadow-lg mb-4">
                        <div>
                            <h1 className="text-2xl font-bold tracking-tight text-slate-100">M.I.T. Phi Beta Epsilon</h1>
                            <h2 className="text-sm text-slate-400">2-Pipe Hydronic Changeover System</h2>
                        </div>
                        
                        {/* Interactive Controls Top */}
                        <div className="flex gap-6 items-center bg-slate-950 p-3 rounded-lg border border-slate-800">
                            <div className="flex flex-col items-center">
                                <span className="text-xs text-slate-400 mb-1">System Power</span>
                                <button 
                                    onClick={() => setSystemEnabled(!systemEnabled)}
                                    className={`px-4 py-1 rounded-full text-sm font-bold transition-colors ${systemEnabled ? 'bg-green-500/20 text-green-400 border border-green-500/50' : 'bg-red-500/20 text-red-400 border border-red-500/50'}`}
                                >
                                    {systemEnabled ? 'ENABLED' : 'DISABLED'}
                                </button>
                            </div>
                            
                            <div className="flex flex-col items-center">
                                <span className="text-xs text-slate-400 mb-1">Season Mode</span>
                                <div className="flex bg-slate-900 rounded-full border border-slate-700 overflow-hidden">
                                    <button onClick={() => setSeason('Winter')} className={`px-3 py-1 text-sm ${season === 'Winter' ? 'bg-red-500/20 text-red-400' : 'text-slate-500 hover:text-slate-300'}`}>Winter</button>
                                    <button onClick={() => setSeason('Summer')} className={`px-3 py-1 text-sm ${season === 'Summer' ? 'bg-blue-500/20 text-blue-400' : 'text-slate-500 hover:text-slate-300'}`}>Summer</button>
                                </div>
                            </div>

                            <div className="flex flex-col min-w-[200px]">
                                <div className="flex justify-between mb-1">
                                    <span className="text-xs text-slate-400">Outside Air Temp (OAT)</span>
                                    <span className="text-xs font-mono text-slate-200">{oat.toFixed(1)} °F</span>
                                </div>
                                <input 
                                    type="range" min="-20" max="100" step="0.1" value={oat}
                                    onChange={(e) => setOat(parseFloat(e.target.value))}
                                    className="w-full accent-slate-400 h-2 bg-slate-800 rounded-lg appearance-none cursor-pointer"
                                />
                            </div>
                        </div>
                    </header>

                    {/* Main Schematic Area */}
                    <div className="flex-1 relative bg-slate-900 border border-slate-800 rounded-xl overflow-hidden p-6 shadow-inner">
                        
                        {/* SVG Pipes Layer */}
                        <svg className="absolute inset-0 w-full h-full pointer-events-none" preserveAspectRatio="none">
                            <defs>
                                <linearGradient id="hx-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                                    <stop offset="0%" stopColor="#ef4444" />
                                    <stop offset="100%" stopColor="#3b82f6" />
                                </linearGradient>
                            </defs>
                            
                            {/* Main Supply Header */}
                            <path d="M 250 150 L 800 150" fill="none" strokeWidth="12" strokeLinecap="round" className={`transition-colors duration-1000 ${pipeColor} ${isActive ? 'pipe-flow' : ''}`} opacity="0.8" />
                            {/* Main Return Header */}
                            <path d="M 250 450 L 800 450" fill="none" strokeWidth="12" strokeLinecap="round" className={`transition-colors duration-1000 ${returnPipeColor} ${isActive ? 'pipe-flow reverse' : ''}`} opacity="0.8" />
                            
                            {/* Chiller Drops */}
                            <path d="M 180 150 L 180 80 L 250 80" fill="none" strokeWidth="8" className={`transition-colors duration-1000 ${pipeColor} ${season === 'Summer' && isActive ? 'pipe-flow' : ''}`} opacity={season === 'Summer' ? '0.8' : '0.2'} />
                            <path d="M 180 450 L 180 120" fill="none" strokeWidth="8" className={`transition-colors duration-1000 ${returnPipeColor} ${season === 'Summer' && isActive ? 'pipe-flow reverse' : ''}`} opacity={season === 'Summer' ? '0.8' : '0.2'} />
                            
                            {/* HX Drops */}
                            <path d="M 180 500 L 180 450 L 250 450" fill="none" strokeWidth="8" className={`transition-colors duration-1000 stroke-red-500 ${season === 'Winter' && isActive ? 'pipe-flow' : ''}`} opacity={season === 'Winter' ? '0.8' : '0.2'} />
                            <path d="M 180 150 L 180 500" fill="none" strokeWidth="8" className={`transition-colors duration-1000 stroke-orange-500 ${season === 'Winter' && isActive ? 'pipe-flow reverse' : ''}`} opacity={season === 'Winter' ? '0.8' : '0.2'} />
                        </svg>

                        {/* Components Container */}
                        <div className="relative w-full h-full flex flex-col justify-between max-w-6xl mx-auto">
                            
                            {/* Top Row: Chiller & Setpoints */}
                            <div className="flex justify-between items-start">
                                {/* Chiller */}
                                <div className={`w-48 bg-slate-800 border-2 rounded-lg p-3 z-10 shadow-lg transition-colors ${season === 'Summer' && systemEnabled ? 'border-blue-500' : 'border-slate-700 opacity-50'}`}>
                                    <h3 className="text-center font-bold text-slate-300 border-b border-slate-700 pb-2 mb-2">Air Cooled Chiller</h3>
                                    <div className="space-y-2">
                                        <div className="flex justify-between items-center text-sm">
                                            <span className="text-slate-400">Status</span>
                                            <span className={`font-bold ${chillerOn ? 'text-green-400' : 'text-slate-500'}`}>{chillerOn ? 'ON' : 'OFF'}</span>
                                        </div>
                                    </div>
                                </div>

                                {/* Reset Schedule Card */}
                                <div className="bg-slate-800/80 backdrop-blur border border-slate-700 p-4 rounded-xl z-10 w-64 shadow-2xl">
                                    <h3 className="text-sm text-slate-400 uppercase tracking-wider mb-3 text-center">Active Control Target</h3>
                                    <div className="flex justify-between items-end mb-4">
                                        <div className="flex flex-col">
                                            <span className="text-xs text-slate-500">Calculated Setpoint</span>
                                            <span className="text-3xl font-mono text-white">{setpoint.toFixed(1)}<span className="text-lg text-slate-500">°F</span></span>
                                        </div>
                                        <div className="flex flex-col text-right">
                                            <span className="text-xs text-slate-500">Actual Supply</span>
                                            <span className={`text-xl font-mono ${Math.abs(setpoint - supplyTemp) < 2 ? 'text-green-400' : 'text-yellow-400'}`}>{supplyTemp.toFixed(1)}<span className="text-sm">°F</span></span>
                                        </div>
                                    </div>
                                    {season === 'Winter' && (
                                        <div className="text-xs text-slate-400 border-t border-slate-700 pt-2 text-center">
                                            OAT Reset: 60°F → 75°F | -20°F → 170°F
                                        </div>
                                    )}
                                </div>
                            </div>

                            {/* Middle Row: Pumps */}
                            <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 flex flex-col gap-6 z-10">
                                {/* Pump Station Controls */}
                                <div className="bg-slate-900/90 border border-slate-700 p-2 rounded-lg text-center mx-auto mb-2">
                                    <span className="text-xs text-slate-400 uppercase mr-2">Lead Pump:</span>
                                    <select 
                                        value={leadPump} 
                                        onChange={(e) => setLeadPump(e.target.value)}
                                        className="bg-slate-800 border border-slate-600 text-sm rounded px-2 py-1 outline-none text-slate-200"
                                    >
                                        <option value="P1">Pump 1</option>
                                        <option value="P2">Pump 2</option>
                                    </select>
                                </div>

                                <div className="flex gap-8">
                                    {/* Pump 1 */}
                                    <div className="flex flex-col items-center group cursor-pointer" onClick={() => setPump1(p => ({...p, override: !p.override}))}>
                                        <div className={`w-20 h-20 rounded-full border-4 flex items-center justify-center bg-slate-800 relative shadow-xl transition-all ${pump1.on ? 'border-green-500 shadow-green-900/20' : 'border-slate-600'}`}>
                                            {pump1.on && <div className="absolute inset-2 border-2 border-dashed border-green-500 rounded-full pump-spin opacity-50"></div>}
                                            <span className="font-bold text-lg z-10 text-slate-200">P1</span>
                                            {pump1.override && <span className="absolute -top-3 -right-3 bg-red-500 text-white text-[10px] px-1 rounded animate-pulse">FAIL</span>}
                                        </div>
                                        <div className="mt-2 text-center bg-slate-900/80 px-2 rounded border border-slate-700">
                                            <div className="text-xs text-slate-400">Status: <span className={pump1.on ? 'text-green-400' : 'text-slate-500'}>{pump1.on ? 'ON' : 'OFF'}</span></div>
                                            <div className="text-xs font-mono text-slate-300">{pump1.speed.toFixed(1)}% VFD</div>
                                        </div>
                                    </div>

                                    {/* Pump 2 */}
                                    <div className="flex flex-col items-center group cursor-pointer" onClick={() => setPump2(p => ({...p, override: !p.override}))}>
                                        <div className={`w-20 h-20 rounded-full border-4 flex items-center justify-center bg-slate-800 relative shadow-xl transition-all ${pump2.on ? 'border-green-500 shadow-green-900/20' : 'border-slate-600'}`}>
                                            {pump2.on && <div className="absolute inset-2 border-2 border-dashed border-green-500 rounded-full pump-spin opacity-50"></div>}
                                            <span className="font-bold text-lg z-10 text-slate-200">P2</span>
                                            {pump2.override && <span className="absolute -top-3 -right-3 bg-red-500 text-white text-[10px] px-1 rounded animate-pulse">FAIL</span>}
                                        </div>
                                        <div className="mt-2 text-center bg-slate-900/80 px-2 rounded border border-slate-700">
                                            <div className="text-xs text-slate-400">Status: <span className={pump2.on ? 'text-green-400' : 'text-slate-500'}>{pump2.on ? 'ON' : 'OFF'}</span></div>
                                            <div className="text-xs font-mono text-slate-300">{pump2.speed.toFixed(1)}% VFD</div>
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="mx-auto mt-2">
                                    <SystemValue label="Differential Pressure" value={dp.toFixed(1)} unit={`/ ${dpSetpoint} psi`} active={isActive} />
                                </div>
                            </div>

                            {/* Building Load (Right Side) */}
                            <div className="absolute right-6 top-1/2 transform -translate-y-1/2 flex flex-col gap-12 z-10">
                                <div className="bg-slate-800/80 backdrop-blur border-l-4 border-slate-600 p-4 rounded-r-xl shadow-xl w-48 text-right">
                                    <h4 className="text-sm font-bold text-slate-300 uppercase tracking-widest mb-4">Building Supply</h4>
                                    <SystemValue label={`${season === 'Winter' ? 'HWS' : 'CHWS'} Temp`} value={supplyTemp.toFixed(1)} unit="°F" />
                                </div>
                                <div className="bg-slate-800/80 backdrop-blur border-l-4 border-slate-600 p-4 rounded-r-xl shadow-xl w-48 text-right">
                                    <h4 className="text-sm font-bold text-slate-300 uppercase tracking-widest mb-4">Building Return</h4>
                                    <SystemValue label={`${season === 'Winter' ? 'HWR' : 'CHWR'} Temp`} value={returnTemp.toFixed(1)} unit="°F" />
                                </div>
                            </div>

                            {/* Bottom Row: Heat Exchanger */}
                            <div className="flex justify-start items-end z-10">
                                <div className={`w-64 bg-slate-800 border-2 rounded-xl p-4 shadow-xl transition-colors ${season === 'Winter' && systemEnabled ? 'border-red-500' : 'border-slate-700 opacity-50'}`}>
                                    <h3 className="text-center font-bold text-slate-300 border-b border-slate-700 pb-2 mb-3">Heat Exchanger (HX-1)</h3>
                                    
                                    <div className="space-y-4">
                                        {/* 1/3 Valve */}
                                        <div className="bg-slate-900 p-2 rounded border border-slate-700">
                                            <div className="flex justify-between text-xs text-slate-400 mb-1">
                                                <span>1/3 Steam Valve</span>
                                                <span className="font-mono text-slate-200">{valve1_3.toFixed(1)}% Open</span>
                                            </div>
                                            <div className="w-full bg-slate-800 h-2 rounded-full overflow-hidden">
                                                <div className="bg-red-500 h-full transition-all duration-500" style={{ width: `${valve1_3}%` }}></div>
                                            </div>
                                        </div>

                                        {/* 2/3 Valve */}
                                        <div className="bg-slate-900 p-2 rounded border border-slate-700">
                                            <div className="flex justify-between text-xs text-slate-400 mb-1">
                                                <span>2/3 Steam Valve</span>
                                                <span className="font-mono text-slate-200">{valve2_3.toFixed(1)}% Open</span>
                                            </div>
                                            <div className="w-full bg-slate-800 h-2 rounded-full overflow-hidden">
                                                <div className="bg-orange-500 h-full transition-all duration-500" style={{ width: `${valve2_3}%` }}></div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    {/* Instructions footer */}
                    <div className="mt-4 text-center text-xs text-slate-500">
                        <p>Interactive Simulation: Adjust the <strong>OAT slider</strong> to see the Calculated Setpoint change. Toggle <strong>Season Mode</strong> to switch between Chiller and Heat Exchanger operation. Click on a <strong>Pump circle (P1 or P2)</strong> to simulate a pump failure and watch the standby unit take over automatically.</p>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
